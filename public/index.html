<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOBChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:100%;
max-width:800px;
height:80vh;
background:white;
border-radius:14px;
/*box-shadow:0 15px 40px rgba(0,0,0,0.12);*/
display:flex;
flex-direction:column;
overflow:hidden;
margin-top: -68px;
}

.header{
background:#111;
color:white;
padding:18px 20px;
font-weight:600;
font-size:18px;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
background:#fafafa;
}

.message{
display:flex;
margin-bottom:18px;
}

.message.user{
justify-content:flex-end;
}

.message.bot{
justify-content:flex-start;
}

.bubble{
max-width:75%;
padding:14px 16px;
border-radius:12px;
line-height:1.6;
font-size:15px;
}

.user .bubble{
background:#111;
color:white;
border-bottom-right-radius:4px;
}

.bot .bubble{
background:white;
border:1px solid #e6e6e6;
border-bottom-left-radius:4px;
}

.bot h3{
margin-top:10px;
}

.bot ul{
padding-left:18px;
}

.input-area{
display:flex;
border-top:1px solid #eee;
background:white;
padding:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
outline:none;
}

button{
margin-left:10px;
background:#111;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#333;
}

.typing{
font-style:italic;
color:#888;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
BOBChat
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<input id="user-input" placeholder="Ask BOB a question..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const input = document.getElementById("user-input");
const chatBox = document.getElementById("chat-box");

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

async function sendMessage(){

const message = input.value.trim();
if(!message) return;

addMessage(message,"user");

input.value="";

const typingId = addTyping();

try{

const res = await fetch("/api/bob-chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
});

const data = await res.json();

removeTyping(typingId);

if(data.error){
addMessage("Error: "+data.error,"bot");
}else{
addMessage(formatText(data.reply),"bot",true);
}

}catch(err){

removeTyping(typingId);
addMessage("Server error. Please try again.","bot");

}

}

function addMessage(text,type,html=false){

const msg = document.createElement("div");
msg.className="message "+type;

const bubble = document.createElement("div");
bubble.className="bubble";

if(html){
bubble.innerHTML=text;
}else{
bubble.textContent=text;
}

msg.appendChild(bubble);
chatBox.appendChild(msg);

chatBox.scrollTop=chatBox.scrollHeight;

}

function addTyping(){

const id="typing-"+Date.now();

const msg=document.createElement("div");
msg.className="message bot";
msg.id=id;

msg.innerHTML=`<div class="bubble typing">BOB is typing...</div>`;

chatBox.appendChild(msg);
chatBox.scrollTop=chatBox.scrollHeight;

return id;

}

function removeTyping(id){
const el=document.getElementById(id);
if(el) el.remove();
}

function formatText(text){

return text

.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
.replace(/^### (.*$)/gim,"<h3>$1</h3>")
.replace(/^## (.*$)/gim,"<h2>$1</h2>")
.replace(/^- (.*$)/gim,"<li>$1</li>")
.replace(/\n/g,"<br>")
.replace(/(<li>.*<\/li>)/g,"<ul>$1</ul>");

}

</script>

</body>
</html>
